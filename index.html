<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QC Production Report</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <style>
        .table-input { border: none !important; background: transparent; width: 100%; text-align: center; font-size: 10px; }
        th { font-size: 9px; background: #f3f4f6; border: 1px solid #000; padding: 4px; }
        td { border: 1px solid #000; height: 30px; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 50; align-items: center; justify-content: center; padding: 10px; }
        .loading { display: none; position: fixed; inset: 0; background: rgba(255,255,255,0.8); z-index: 100; align-items: center; justify-content: center; }
    </style>
</head>
<body class="bg-gray-50 p-2 text-xs">

    <div id="loading" class="loading flex-col">
        <div class="animate-spin rounded-full h-10 w-10 border-b-2 border-blue-600 mb-2"></div>
        <p>Sedang memproses...</p>
    </div>

    <div class="max-w-full bg-white border border-black shadow-sm">
        <div class="p-4 border-b border-black flex justify-between items-center bg-white">
            <div class="flex flex-col gap-2">
                <input type="date" id="filterDate" class="border p-1 rounded">
                <button onclick="loadData()" class="bg-blue-600 text-white px-4 py-1 rounded">Load Data</button>
            </div>
            <h1 class="text-xl font-bold">PRODUCTION REPORT</h1>
            <button onclick="openModal()" class="bg-green-600 text-white px-6 py-2 rounded font-bold">+ SCAN QR</button>
        </div>

        <div class="overflow-x-auto" style="max-height: 500px;">
            <table class="w-full border-collapse" style="min-width: 2500px;">
                <thead>
                    <tr>
                        <th style="width: 40px;">NO</th>
                        <th style="width: 60px;">LINE</th>
                        <th style="width: 150px;">CC NO</th>
                        <th style="width: 150px;">CUSTOMER</th>
                        <th style="width: 100px;">SPEC</th>
                        <th style="width: 120px;">RAW SIZE</th>
                        <th style="width: 80px;">WEIGHT</th>
                        <th style="width: 80px;">QTY FG</th>
                        <th style="width: 80px;">QTY NG</th>
                        <th style="width: 80px;">TOTAL</th>
                        <th style="width: 100px;">LEN (m)</th>
                        <th style="width: 100px;">START</th>
                        <th style="width: 100px;">END</th>
                        <th>REMARK</th>
                        <th>MEMBER</th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </div>

    <div id="qrModal" class="modal">
        <div class="bg-white rounded-lg w-full max-w-2xl max-h-screen overflow-y-auto p-4">
            <div class="flex justify-between items-center border-b pb-2 mb-4">
                <h2 class="font-bold text-lg">Input Data Produksi</h2>
                <button onclick="closeModal()" class="text-red-600 font-bold text-xl">&times;</button>
            </div>
            
            <div id="reader" class="mb-4"></div>

            <form id="prodForm" class="grid grid-cols-2 gap-3">
                <div class="col-span-2 bg-blue-50 p-2 rounded border border-blue-200">
                    <p><strong>QR:</strong> <span id="displayQR">-</span></p>
                    <input type="hidden" id="in_qrcode">
                    <input type="hidden" id="in_ccNo">
                    <input type="hidden" id="in_spec">
                    <input type="hidden" id="in_rawSize">
                    <input type="hidden" id="in_weightRM">
                </div>

                <div><label class="block font-bold">Line</label>
                    <select id="in_line" class="w-full border p-2 rounded">
                        <option>LV1</option><option>LM1</option><option>SL1</option><option>MS1</option>
                    </select>
                </div>
                <div><label class="block font-bold">Customer</label><input type="text" id="in_customer" class="w-full border p-2 rounded" required></div>
                <div><label class="block font-bold">Actual Width RM</label><input type="text" id="in_actualWidth" class="w-full border p-2 rounded"></div>
                <div><label class="block font-bold">Product Size</label><input type="text" id="in_prodSize" class="w-full border p-2 rounded"></div>
                <div><label class="block font-bold">Qty FG</label><input type="number" id="in_qtyFG" class="w-full border p-2 rounded" value="0"></div>
                <div><label class="block font-bold">Qty NG</label><input type="number" id="in_qtyNG" class="w-full border p-2 rounded" value="0"></div>
                <div><label class="block font-bold">Total Length (m)</label><input type="text" id="in_len" class="w-full border p-2 rounded"></div>
                <div><label class="block font-bold">Start Process</label><input type="time" id="in_start" class="w-full border p-2 rounded"></div>
                <div><label class="block font-bold">End Process</label><input type="time" id="in_end" class="w-full border p-2 rounded"></div>
                <div class="col-span-2"><label class="block font-bold">Remark</label><input type="text" id="in_remark" class="w-full border p-2 rounded"></div>
                <div><label class="block font-bold">Line Member</label><input type="text" id="in_member" class="w-full border p-2 rounded"></div>
                <div><label class="block font-bold">Report By</label><input type="text" id="in_reportBy" class="w-full border p-2 rounded"></div>
                
                <div class="col-span-2 flex gap-2 mt-4">
                    <button type="button" onclick="submitData()" class="flex-1 bg-blue-600 text-white py-3 rounded font-bold">SIMPAN DATA</button>
                    <button type="button" onclick="closeModal()" class="bg-gray-400 text-white px-4 rounded">Batal</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbwxWXOiaP9ro0VtgbmRuAGZ_b6tb6lp_2pdK5Ga-qlNeZe2I0hlakqewIvkUHuyL-ZscQ/exec';
        let scanner = null;

        function openModal() {
            document.getElementById('qrModal').style.display = 'flex';
            scanner = new Html5QrcodeScanner("reader", { fps: 10, qrbox: 250 });
            scanner.render(onScanSuccess);
        }

        function closeModal() {
            if(scanner) scanner.clear();
            document.getElementById('qrModal').style.display = 'none';
            document.getElementById('prodForm').reset();
        }

        function onScanSuccess(text) {
            const parts = text.split(',');
            if (parts.length >= 6) {
                document.getElementById('in_qrcode').value = text;
                document.getElementById('in_ccNo').value = parts[0];
                document.getElementById('in_spec').value = parts[1];
                document.getElementById('in_rawSize').value = parts[2];
                document.getElementById('in_weightRM').value = parts[5];
                document.getElementById('displayQR').innerText = parts[0] + " | " + parts[1];
                scanner.clear();
            } else {
                alert("Format QR tidak dikenal!");
            }
        }

        async function submitData() {
            const loader = document.getElementById('loading');
            loader.style.display = 'flex';

            const payload = {
                action: 'saveReport',
                line: document.getElementById('in_line').value,
                qrcode: document.getElementById('in_qrcode').value,
                ccNo: document.getElementById('in_ccNo').value,
                customer: document.getElementById('in_customer').value,
                spec: document.getElementById('in_spec').value,
                rawMaterialSize: document.getElementById('in_rawSize').value,
                actualWidthRM: document.getElementById('in_actualWidth').value,
                weightRM: document.getElementById('in_weightRM').value,
                productSize: document.getElementById('in_prodSize').value,
                qtyFG: document.getElementById('in_qtyFG').value,
                qtyNG: document.getElementById('in_qtyNG').value,
                totalLength: document.getElementById('in_len').value,
                startProses: document.getElementById('in_start').value,
                endProses: document.getElementById('in_end').value,
                remark: document.getElementById('in_remark').value,
                lineMember: document.getElementById('in_member').value,
                reportBy: document.getElementById('in_reportBy').value
            };

            try {
                // MENGGUNAKAN text/plain UNTUK MENGHINDARI PREFLIGHT OPTIONS
                const response = await fetch(WEB_APP_URL, {
                    method: 'POST',
                    mode: 'cors', // Ubah kembali ke cors namun Content-Type text/plain
                    headers: { 'Content-Type': 'text/plain' },
                    body: JSON.stringify(payload)
                });

                const result = await response.json();
                if (result.success) {
                    alert('✅ Berhasil Simpan!');
                    closeModal();
                    loadData();
                } else {
                    alert('❌ Error: ' + result.error);
                }
            } catch (err) {
                alert('❌ Gagal terhubung ke server. Pastikan deployment diatur ke "Anyone".');
            } finally {
                loader.style.display = 'none';
            }
        }

        async function loadData() {
            const date = document.getElementById('filterDate').value;
            const loader = document.getElementById('loading');
            loader.style.display = 'flex';
            
            try {
                const url = date ? `${WEB_APP_URL}?action=getByDate&date=${date}` : WEB_APP_URL;
                const resp = await fetch(url);
                const res = await resp.json();
                
                const tbody = document.getElementById('tableBody');
                tbody.innerHTML = '';
                
                res.data.forEach((row, i) => {
                    const tr = `<tr>
                        <td class="text-center">${i+1}</td>
                        <td class="text-center">${row.Line}</td>
                        <td class="px-2">${row['CC No']}</td>
                        <td class="px-2">${row.Customer}</td>
                        <td class="text-center">${row.Spec}</td>
                        <td class="text-center">${row['Raw Material Size']}</td>
                        <td class="text-center">${row['Weight RM']}</td>
                        <td class="text-center">${row['Qty FG']}</td>
                        <td class="text-center">${row['Qty NG']}</td>
                        <td class="text-center font-bold">${row['Qty Total']}</td>
                        <td class="text-center">${row['Total Length']}</td>
                        <td class="text-center">${row['Start Proses']}</td>
                        <td class="text-center">${row['End Proses']}</td>
                        <td class="px-2">${row.Remark}</td>
                        <td class="px-2">${row['Line Member']}</td>
                    </tr>`;
                    tbody.innerHTML += tr;
                });
            } catch (err) {
                console.error(err);
            } finally {
                loader.style.display = 'none';
            }
        }

        // Load data saat pertama buka
        window.onload = loadData;
    </script>
</body>
</html>
